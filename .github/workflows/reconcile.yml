# .github/workflows/reconcile.yml
# Ежедневная сверка заявок + обновление каталога формы.
# Запускается в 06:00 UTC (09:00 МСК) каждый день.

name: Daily Reconciliation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Run reconciliation
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEETS_URL: ${{ secrets.SHEETS_URL }}
          SELLER_TAGS: ${{ secrets.SELLER_TAGS }}
        run: python reconcile.py

      - name: Update catalog from feed
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
        run: python generate_catalog.py --url "${FEED_URL}" --output catalog.json

      - name: Commit catalog if changed
        run: |
          git diff --quiet catalog.json 2>/dev/null && echo "No catalog changes" || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add catalog.json
            git commit -m "chore: update catalog from feed [$(date -u +%Y-%m-%d)]"
            git push
          }
